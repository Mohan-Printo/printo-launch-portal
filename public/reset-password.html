<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - Printo Product Launch Portal</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 14px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h2 {
      margin: 0 0 10px;
      color: #ffffff;
      text-align: center;
    }

    p {
      font-size: 14px;
      color: #94a3b8;
      text-align: center;
      margin-bottom: 24px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #cbd5e1;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 16px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #fff;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #4f6ef7, #6366f1);
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.95;
    }

    .message {
      margin-top: 16px;
      font-size: 14px;
      text-align: center;
      padding: 12px;
      border-radius: 8px;
      display: none;
    }

    .success {
      background: rgba(34, 197, 94, 0.15);
      color: #86efac;
      border: 1px solid rgba(34, 197, 94, 0.3);
    }

    .error {
      background: rgba(239, 68, 68, 0.15);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .login-link {
      margin-top: 18px;
      text-align: center;
      display: none;
    }

    .login-link a {
      color: #818cf8;
      text-decoration: none;
      font-size: 14px;
    }

    .login-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Reset Your Password</h2>
    <p>Enter your new password below to continue.</p>

    <form id="resetForm">
      <label for="newPassword">New Password</label>
      <input type="password" id="newPassword" placeholder="Enter new password" required minlength="6" />

      <label for="confirmPassword">Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Confirm new password" required minlength="6" />

      <button type="submit">Reset Password</button>
    </form>

    <div id="message" class="message"></div>

    <div id="loginLink" class="login-link">
      <a href="/">Go to Login</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('resetForm');
    const messageBox = document.getElementById('message');
    const loginLink = document.getElementById('loginLink');

    function showMessage(text, type) {
      messageBox.style.display = 'block';
      messageBox.className = 'message ' + type;
      messageBox.textContent = text;
    }

    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
      showMessage('Invalid reset link. Token is missing.', 'error');
      form.style.display = 'none';
    }

    form.addEventListener('submit', async function(e) {
      e.preventDefault();

      const newPassword = document.getElementById('newPassword').value.trim();
      const confirmPassword = document.getElementById('confirmPassword').value.trim();

      if (!newPassword || !confirmPassword) {
        showMessage('Please fill in all fields.', 'error');
        return;
      }

      if (newPassword.length < 6) {
        showMessage('Password must be at least 6 characters.', 'error');
        return;
      }

      if (newPassword !== confirmPassword) {
        showMessage('Passwords do not match.', 'error');
        return;
      }

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            token,
            newPassword
          })
        });

        const data = await res.json();

        if (!res.ok) {
          showMessage(data.error || 'Unable to reset password.', 'error');
          return;
        }

        showMessage(data.message || 'Password reset successful.', 'success');
        form.style.display = 'none';
        loginLink.style.display = 'block';
      } catch (err) {
        showMessage('Something went wrong. Please try again.', 'error');
      }
    });
  </script>
</body>
</html>
